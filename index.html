<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Noto+Sans:wght@400;500;700&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Ảnh nền -->

<img
src="cover.png"
class="background"
alt="background">

<!-- Lớp phủ -->

<div id="overlay"></div>

<!-- Canvas tuyết -->

<canvas id="snow"></canvas>

<!-- Phụ đề -->

<div id="subtitle"></div>

<!-- Nút Play -->

<button id="playButton">

<svg
width="34"
height="34"
viewBox="0 0 24 24"
fill="currentColor">

<path d="M8 5v14l11-7z"/>

</svg>

</button>

<!-- Nút Replay -->

<button id="replayButton">

<svg
width="30"
height="30"
viewBox="0 0 24 24"
fill="currentColor">

<path d="M12 5V2L7 7l5 5V9c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6H4c0 4.4 3.6 8 8 8s8-3.6 8-8-3.6-8-8-8z"/>

</svg>

</button>

<!-- Audio -->

<audio id="audio">

<source
src="voice.m4a">

</audio>

<script src="snow.js"></script>

<script src="script.js"></script>

</body>

</html>
